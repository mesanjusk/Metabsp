name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Metabsp backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meta.sanjusk.in/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
