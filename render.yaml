services:
  - type: web
    name: metabsp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

      # ── WhatsApp Cloud (Metabsp) ─────────────────────────────────
      # ACCESS_TOKEN_SECRET is a legacy alias for JWT_SECRET below, read only
      # if JWT_SECRET is unset. Set JWT_SECRET going forward.
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      # WHATSAPP_API_VERSION is the canonical name (see
      # backend/src/config/graphApi.js); META_API_VERSION below is read only
      # as a legacy fallback if this is unset.
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: META_API_VERSION
        value: v18.0
      - key: META_EMBEDDED_SIGNUP_CONFIG_ID
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ENFORCE_WEBHOOK_SIGNATURE
        value: "true"
      - key: WHATSAPP_TOKEN_ENCRYPTION_KEY
        sync: false

      # ── Auth (shared by every login path) ────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      # BOOTSTRAP_USERNAME/PASSWORD are optional: an env-configured super-admin
      # login that upserts (and keeps in sync with) a real DB user on first use.
      - key: BOOTSTRAP_USERNAME
        sync: false
      - key: BOOTSTRAP_NAME
        sync: false
      - key: BOOTSTRAP_PASSWORD
        sync: false
      # SUPER_ADMIN_USERNAME/PASSWORD: set both to seed a super admin at boot.
      # There is no default password — leaving these unset just skips seeding.
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_NAME
        sync: false
      - key: SUPER_ADMIN_MOBILE
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: en_US
      - key: REDIS_URL
        fromService:
          type: redis
          name: metabsp-redis
          property: connectionString

  - type: redis
    name: metabsp-redis
    ipAllowList: []
    plan: starter
