server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # SPA fallback — same rewrite behavior as vercel.json's
        # `/((?!api/).*)` rule, since this container does not proxy /api
        # itself (VITE_API_SERVER is baked in at build time to point at the
        # backend service directly).
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
